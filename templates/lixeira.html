<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lixeira | CXProjetos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --bg-board:#f4f4f5; --text-main:#1e1e1e; --text-muted:#71717a; --primary-purple:#7371ff; --accent-lime:#bef533; --accent-pink:#ff43c0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; border-radius: 0 !important; border: none; }
        body { background-color: var(--bg-board); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding-left: 68px; }
        ::-webkit-scrollbar { width: 5px; height: 5px; } ::-webkit-scrollbar-thumb { background: #d4d4d8; }
        .top-bar { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); height: 70px; min-height: 70px; flex-shrink: 0; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 30px rgba(0,0,0,0.02); z-index: 10; }
        .top-bar-logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; cursor: pointer; }
        .top-bar-logo span { color: var(--primary-purple); }
        .command-bar { padding: 24px 40px 14px 40px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 6px 40px 40px 40px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; font-size: 12px; font-weight: 800; cursor: pointer; background: rgba(255,255,255,0.7); border-radius: 50px !important; transition: 0.2s; color: var(--text-muted); }
        .tab.active { background: var(--text-main); color: #fff; }
        .item-row { background: #fff; padding: 16px 22px; margin-bottom: 8px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .item-icon { width: 42px; height: 42px; min-width: 42px; background: #f4f4f5; display: flex; align-items: center; justify-content: center; border-radius: 12px !important; color: var(--text-muted); }
        .item-info { flex-grow: 1; min-width: 0; }
        .item-nome { font-size: 14px; font-weight: 800; }
        .item-meta { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 3px; }
        .btn-restaurar { background: #dcfce7; color: #166534; padding: 9px 16px; font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 50px !important; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-restaurar:hover { background: #bbf7d0; }
        .btn-deletar { background: transparent; color: #a1a1aa; padding: 9px; cursor: pointer; border-radius: 10px !important; display: flex; transition: 0.2s; }
        .btn-deletar:hover { background: #fee2e2; color: #ef4444; }
        .empty-state { text-align:center; padding: 70px 20px; color: var(--text-muted); }
        .empty-state .material-symbols-rounded { font-size: 54px; opacity: 0.2; display:block; margin-bottom: 14px; }
        .empty-state p { font-size: 13px; font-weight: 600; }
        .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10001; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(30,30,30,0.95); color: white; padding: 12px 22px; border-radius: 50px !important; font-size: 12px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { from { opacity:0; transform: translateY(15px);} to {opacity:1; transform: translateY(0);} }
        .info-banner { background: #fffbeb; border-left: 3px solid #f59e0b; padding: 12px 18px; font-size: 12px; color: #854d0e; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-logo" onclick="window.location.href='/'">CX<span>Projetos</span></div>
        {% include '_usermenu.html' %}
    </div>
    {% include '_sidebar.html' %}

    <div class="command-bar">
        <div>
            <h2 style="font-size:22px; font-weight:900; letter-spacing:-0.5px;">Lixeira</h2>
            <p style="font-size:12px; color:var(--text-muted); font-weight:500; margin-top:3px;">Itens excluídos podem ser restaurados ou removidos definitivamente</p>
        </div>
    </div>

    <div class="scroll-area">
        <div class="info-banner">
            <span class="material-symbols-rounded" style="font-size:18px;">info</span>
            Itens aqui não aparecem na plataforma. Restaure para reativar, ou exclua definitivamente (esta ação é irreversível).
        </div>
        <div class="tabs">
            <div class="tab active" id="tab-projetos" onclick="mudarAba('projetos')">Projetos</div>
            <div class="tab" id="tab-clientes" onclick="mudarAba('clientes')">Clientes</div>
        </div>
        <div id="conteudo"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let nomeUsuario = '{{ usuario_nome }}';
        let dados = { projetos: [], clientes: [] };
        let abaAtual = 'projetos';

        document.addEventListener('DOMContentLoaded', carregar);

        async function carregar() {
            try {
                const res = await fetch('/api/lixeira');
                if (res.status === 403) { document.body.innerHTML = '<div style="padding:60px;text-align:center;font-weight:700;">Acesso negado.</div>'; return; }
                const data = await res.json();
                dados.projetos = data.projetos || [];
                dados.clientes = data.clientes || [];
                render();
            } catch(e) { showToast('Erro ao carregar lixeira.', 'error'); }
        }

        function escH(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function fmtData(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('pt-BR'); }

        function mudarAba(aba) {
            abaAtual = aba;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + aba).classList.add('active');
            render();
        }

        function render() {
            const c = document.getElementById('conteudo');
            const lista = dados[abaAtual];
            if (!lista || lista.length === 0) {
                c.innerHTML = `<div class="empty-state"><span class="material-symbols-rounded">delete_outline</span><p>Nenhum ${abaAtual === 'projetos' ? 'projeto' : 'cliente'} na lixeira.</p></div>`;
                return;
            }
            const tipo = abaAtual === 'projetos' ? 'projeto' : 'cliente';
            c.innerHTML = lista.map(item => {
                const nome = abaAtual === 'projetos' ? item.nome_projeto : item.nome_empresa;
                const meta = abaAtual === 'projetos'
                    ? `${escH(item.empresa || 'Sem cliente')} · Excluído em ${fmtData(item.excluido_em)}`
                    : `Excluído em ${fmtData(item.excluido_em)}`;
                return `
                <div class="item-row">
                    <div class="item-icon"><span class="material-symbols-rounded">${abaAtual === 'projetos' ? 'folder' : 'apartment'}</span></div>
                    <div class="item-info">
                        <div class="item-nome">${escH(nome)}</div>
                        <div class="item-meta">${meta}</div>
                    </div>
                    <div class="btn-restaurar" onclick="restaurar('${tipo}', '${item.id}')">
                        <span class="material-symbols-rounded" style="font-size:16px;">restore</span> RESTAURAR
                    </div>
                    <div class="btn-deletar" onclick="deletarDefinitivo('${tipo}', '${item.id}', '${escH(nome).replace(/'/g, "")}')" title="Excluir definitivamente">
                        <span class="material-symbols-rounded" style="font-size:18px;">delete_forever</span>
                    </div>
                </div>`;
            }).join('');
        }

        async function restaurar(tipo, id) {
            try {
                const res = await fetch(`/api/lixeira/${tipo}/${id}/restaurar`, { method: 'PUT' });
                if (res.ok) { showToast('Item restaurado!', 'success'); carregar(); }
                else showToast('Erro ao restaurar.', 'error');
            } catch(e) { showToast('Erro de conexão.', 'error'); }
        }

        async function deletarDefinitivo(tipo, id, nome) {
            if (!confirm(`Excluir DEFINITIVAMENTE "${nome}"?\n\nEsta ação não pode ser desfeita.`)) return;
            try {
                const res = await fetch(`/api/lixeira/${tipo}/${id}/definitivo`, { method: 'DELETE' });
                if (res.ok) { showToast('Item excluído definitivamente.', 'success'); carregar(); }
                else showToast('Erro ao excluir.', 'error');
            } catch(e) { showToast('Erro de conexão.', 'error'); }
        }

        function showToast(msg, tipo='success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<span class="material-symbols-rounded" style="font-size:16px; color:${tipo==='success'?'var(--accent-lime)':'var(--accent-pink)'};">${tipo==='success'?'check_circle':'error'}</span>${msg}`;
            c.appendChild(t); setTimeout(() => t.remove(), 3500);
        }
    </script>
</body>
</html>
