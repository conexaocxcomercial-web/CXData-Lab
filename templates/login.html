<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CXData Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-purple: #7371ff; --accent-lime: #bef533; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f4f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .login-card { 
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px);
            padding: 50px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); text-align: center;
        }

        h1 { font-size: 28px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        h1 span { color: var(--primary-purple); }
        p { color: #71717a; font-size: 14px; margin-bottom: 30px; font-weight: 500; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #71717a; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; background: #fff; border: none; outline: none; font-size: 14px; border-left: 3px solid transparent; transition: 0.2s; }
        input:focus { border-left-color: var(--primary-purple); }

        .btn-login { 
            width: 100%; padding: 15px; background: var(--primary-purple); color: white;
            font-weight: 800; border: none; cursor: pointer; border-radius: 50px; 
            margin-top: 10px; transition: 0.2s;
        }
        .btn-login:hover { background: #1e1e1e; }
        #mensagemErro { color: #ef4444; font-size: 12px; margin-top: 15px; font-weight: 600; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>CXData <span>Flow</span></h1>
        <p>Acesse seu workspace estratégico.</p>

        <div class="input-group">
            <label>E-mail Corporativo</label>
            <input type="email" id="email" placeholder="nome@cxdata.com.br">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••">
        </div>

        <button class="btn-login" onclick="executarLogin()">ENTRAR NO SISTEMA</button>
        <div id="mensagemErro">Erro ao fazer login. Verifique seus dados.</div>
    </div>

    <script>
        async function executarLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const msgErro = document.getElementById('mensagemErro');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });

            if (res.ok) {
                window.location.href = '/';
            } else {
                msgErro.style.display = 'block';
            }
        }
    </script>
</body>
</html>
